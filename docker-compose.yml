services:
  mysql:
    image: mysql:8.0
    container_name: polaris-test-platform-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: fastapi_admin
      MYSQL_USER: fastapi_admin
      MYSQL_PASSWORD: fastapi_admin_password
    volumes:
      - ./docker-mysql-data:/var/lib/mysql
      - ./deploy/mysql-init.sql:/docker-entrypoint-initdb.d/mysql-init.sql:ro
    ports:
      - "3306:3306"
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  app:
    build: .
    container_name: polaris-test-platform-app
    ports:
      - "3100:80"
    depends_on:
      - mysql
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=fastapi_admin
      - MYSQL_PASSWORD=fastapi_admin_password
      - MYSQL_DATABASE=fastapi_admin
    restart: unless-stopped